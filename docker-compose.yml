version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: walmart_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: walmart123
      MYSQL_DATABASE: walmart_sales
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:7.0
    container_name: walmart_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: